plugins {
    id 'com.android.application'
}

android {
    namespace 'com.sen204.calcpro'
    compileSdk 34

    defaultConfig {
        applicationId "com.sen204.calcpro"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
